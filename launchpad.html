<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdLens — Launchpad</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1: #EAF7F1;
    --bg-2: #E3EEFC;
    --ink: #0B2B26;
    --ink-soft: #4B635E;
    --surface: rgba(255, 255, 255, 0.86);
    --glass-hi: rgba(255, 255, 255, 0.62);
    --glass-mid: rgba(255, 255, 255, 0.4);
    --glass-border: rgba(255, 255, 255, 0.55);
    --border: rgba(11, 43, 38, 0.1);
    --teal: #0F7A6E;
    --blue: #1C4E9C;
    --amber: #FF8A3D;
    --red: #e8674a;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    min-height: 100vh;
    background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a{ color: inherit; text-decoration:none; }
  button{ font-family: inherit; }

  .blobs{
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .blob{ position: absolute; border-radius: 50%; filter: blur(75px); opacity: 0.5; }
  .blob-1{ width: 420px; height: 420px; background: #BFEEE2; top: -160px; left: -120px; animation: drift1 30s ease-in-out infinite alternate; }
  .blob-2{ width: 460px; height: 460px; background: #CFE0FB; bottom: -180px; right: -140px; animation: drift2 34s ease-in-out infinite alternate; }
  .blob-3{ width: 280px; height: 280px; background: #FFE3C9; top: 30%; right: 10%; opacity: 0.32; animation: drift1 24s ease-in-out infinite alternate-reverse; }
  @keyframes drift1{ from{ transform: translate(0,0); } to{ transform: translate(40px,30px); } }
  @keyframes drift2{ from{ transform: translate(0,0); } to{ transform: translate(-30px,-40px); } }

  .topbar{
    position: relative;
    z-index: 1;
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 20px 40px;
    background: var(--glass-mid);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 12px 30px -22px rgba(11, 43, 38, 0.18);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .brand-mark{
    width:22px; height:22px;
    border-radius:7px;
    background: linear-gradient(135deg, var(--teal), var(--blue));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .brand-mark svg{ width:13px; height:13px; }
  .user-area{
    display:flex;
    align-items:center;
    gap:18px;
    font-size: 13.5px;
    color: var(--ink-soft);
  }
  .user-email{
    font-family: var(--font-mono);
    font-size: 12.5px;
  }
  .logout-btn{
    background: var(--glass-hi);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    color: var(--ink-soft);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
  }
  .logout-btn:hover{ border-color: var(--teal); color: var(--ink); background: rgba(255,255,255,0.85); }
  .logout-btn:focus-visible{ outline: 2px solid var(--blue); outline-offset: 2px; }

  .stage{
    position: relative;
    z-index: 1;
    max-width: 880px;
    margin: 0 auto;
    padding: 64px 32px 80px;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal);
    background: rgba(15, 122, 110, 0.08);
    border: 1px solid rgba(15, 122, 110, 0.2);
    padding: 7px 14px;
    border-radius: 999px;
    margin-bottom: 20px;
  }

  h1{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(28px, 4vw, 38px);
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 12px;
  }
  h1 .grad{
    background: linear-gradient(100deg, var(--teal), var(--blue));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .stage-sub{
    font-size: 15px;
    color: var(--ink-soft);
    margin-bottom: 44px;
    max-width: 60ch;
    line-height: 1.6;
  }

  .report-card{
    position: relative;
    overflow: hidden;
    background: var(--glass-mid);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 36px;
    margin-bottom: 24px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset, 0 24px 60px -34px rgba(11, 43, 38, 0.3);
  }
  .report-card::before{
    content: '';
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(15, 122, 110, 0.14), transparent 70%);
    top: -130px;
    right: -90px;
    pointer-events: none;
  }
  .report-card-head{
    position: relative;
    display:flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 26px;
    flex-wrap: wrap;
  }
  .report-card-title{
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }
  .report-card-date{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .freshness-tag{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 6px 13px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .freshness-fresh{ background: rgba(15, 122, 110, 0.12); color: var(--teal); }
  .freshness-stale{ background: rgba(232,103,74,0.13); color: var(--red); }

  .stat-row{
    position: relative;
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat{
    background: var(--glass-hi);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset;
  }
  .stat-label{
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .stat-value{
    font-family: var(--font-mono);
    font-size: 19px;
    font-weight: 600;
    color: var(--ink);
  }
  .stat-value.good{ color: var(--teal); }
  .stat-value.bad{ color: var(--red); }

  .card-actions{
    position: relative;
    display:flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn{
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: transform .15s, box-shadow .15s, background .15s;
  }
  .btn:active{ transform: scale(0.98); }
  .btn:focus-visible{ outline: 2px solid var(--blue); outline-offset: 2px; }
  .btn-primary{
    background: linear-gradient(100deg, var(--teal), var(--blue));
    color: #fff;
    box-shadow: 0 10px 20px -10px rgba(15, 80, 90, 0.5);
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 14px 24px -10px rgba(15, 80, 90, 0.6); }
  .btn-ghost{
    background: var(--glass-hi);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    color: var(--ink);
  }
  .btn-ghost:hover{ background: rgba(255,255,255,0.85); border-color: var(--teal); }

  .empty-state{
    position: relative;
    background: var(--glass-mid);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px dashed var(--border);
    border-radius: 28px;
    padding: 60px 32px;
    text-align: center;
  }
  .empty-icon{
    width: 48px; height: 48px;
    margin: 0 auto 20px;
    color: var(--teal);
    opacity: 0.55;
  }
  .empty-title{
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .empty-sub{
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 26px;
    max-width: 42ch;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  .loading-stage{
    position: relative;
    z-index: 1;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: 60vh;
    color: var(--ink-soft);
    font-family: var(--font-mono);
    font-size: 13px;
  }

  @media (max-width: 640px){
    .topbar{ padding: 16px 20px; }
    .stage{ padding: 40px 18px 60px; }
    .stat-row{ grid-template-columns: repeat(2, 1fr); }
    .report-card{ padding: 24px; }
    .empty-state{ padding: 44px 22px; }
    .user-email{ display:none; }
    .card-actions{ flex-direction: column; }
    .card-actions .btn{ width: 100%; }
  }

  @media (prefers-reduced-motion: reduce){
    .blob{ animation: none; }
  }
</style>
</head>
<body>

<div class="blobs" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="topbar">
  <div class="brand">
    <span class="brand-mark"><svg viewBox="0 0 26 26" fill="none"><ellipse cx="13" cy="13" rx="11" ry="7" stroke="white" stroke-width="2.2" fill="none"/><circle cx="13" cy="13" r="3.5" fill="white"/><line x1="20" y1="6" x2="24" y2="2" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg></span>
    AdLens
  </div>
  <div class="user-area">
    <span class="user-email" id="userEmail"></span>
    <button class="logout-btn" id="logoutBtn">Log out</button>
  </div>
</div>

<div id="loadingStage" class="loading-stage">Loading your workspace…</div>

<div class="stage" id="stage" style="display:none;">
  <div class="eyebrow">Launchpad</div>
  <h1 id="greeting">Welcome back</h1>
  <p class="stage-sub">Pick up where you left off, or upload a fresh report to analyse.</p>

  <div id="reportArea"></div>
</div>

<script>
  const SUPABASE_URL = "https://ymqlrqmldeqsswszyffe.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltcWxycW1sZGVxc3N3c3p5ZmZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODUzNzcsImV4cCI6MjA5NzU2MTM3N30._3NMYi_CKIbhamGzcIVyiQOFuUvbyPFvGf6fWVhpzeY";

  if (!window.supabase || typeof window.supabase.createClient !== 'function') {
    document.body.innerHTML = '<div style="padding:48px;font-family:sans-serif;">Couldn\'t load required scripts. Please refresh.</div>';
    throw new Error('Supabase JS library failed to load.');
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      storage: window.localStorage
    }
  });

  const REPORT_FRESH_DAYS = 7;

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatDate(iso){
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' }) +
      ' at ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  }

  function daysAgo(iso){
    const then = new Date(iso).getTime();
    const now = Date.now();
    return Math.floor((now - then) / (1000 * 60 * 60 * 24));
  }

  function renderEmptyState(){
    document.getElementById('reportArea').innerHTML = `
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="9" y1="13" x2="15" y2="13"></line>
          <line x1="9" y1="17" x2="15" y2="17"></line>
        </svg>
        <div class="empty-title">No report yet</div>
        <p class="empty-sub">Upload your Sponsored Products report to see ACOS, ROAS and spend broken down by campaign, search term and product.</p>
        <a href="/dashboard.html"><button class="btn btn-primary">Upload your first report</button></a>
      </div>
    `;
  }

  function formatNumber(num){
    if (num >= 10000000) return (num / 10000000).toFixed(1) + 'Cr';
    if (num >= 100000) return (num / 100000).toFixed(1) + 'L';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return Number(num).toFixed(0);
  }

  function renderReportCard(row){
    const uploadedAt = row.uploaded_at;
    const stale = daysAgo(uploadedAt) > REPORT_FRESH_DAYS;
    const totals = (row.report_data && row.report_data.totals) || {};

    const spend = totals.spend != null ? formatNumber(totals.spend) : '—';
    const sales = totals.sales != null ? formatNumber(totals.sales) : (totals.gmvBaseline != null ? formatNumber(totals.gmvBaseline) : '—');
    const acos = totals.acos != null ? totals.acos.toFixed(1) + '%' : '—';
    const roas = totals.roas != null ? totals.roas.toFixed(2) + 'x' : '—';

    document.getElementById('reportArea').innerHTML = `
      <div class="report-card">
        <div class="report-card-head">
          <div>
            <div class="report-card-title">Your last report</div>
            <div class="report-card-date">Uploaded ${escapeHtml(formatDate(uploadedAt))}</div>
          </div>
          <span class="freshness-tag ${stale ? 'freshness-stale' : 'freshness-fresh'}">
            ${stale ? 'Data may be stale' : 'Recently updated'}
          </span>
        </div>
        <div class="stat-row">
          <div class="stat"><div class="stat-label">Spend</div><div class="stat-value">${spend}</div></div>
          <div class="stat"><div class="stat-label">Ad Sales</div><div class="stat-value">${sales}</div></div>
          <div class="stat"><div class="stat-label">ACOS</div><div class="stat-value ${parseFloat(acos) > 35 ? 'bad' : ''}">${acos}</div></div>
          <div class="stat"><div class="stat-label">ROAS</div><div class="stat-value ${parseFloat(roas) > 2 ? 'good' : ''}">${roas}</div></div>
        </div>
        <div class="card-actions">
          <button class="btn btn-primary" id="openReportBtn">Open this report</button>
          <button class="btn btn-ghost" id="uploadNewBtn">Upload a new report</button>
        </div>
      </div>
    `;

    document.getElementById('openReportBtn').addEventListener('click', () => {
      sessionStorage.setItem('ppc_reopen_report', JSON.stringify(row.report_data));
      window.location.href = '/dashboard.html?reopen=1';
    });

    document.getElementById('uploadNewBtn').addEventListener('click', () => {
      const proceed = confirm('Uploading a new report will replace your saved one. Continue?');
      if (proceed) window.location.href = '/dashboard.html';
    });
  }

  function usernameFromEmail(email){
    if (!email) return 'there';
    return email.split('@')[0];
  }

  async function ensureProfileExists(user){
    if (!user) return usernameFromEmail(user && user.email);
    const { data: existing } = await sb.from('profiles').select('username').eq('user_id', user.id).maybeSingle();
    if (existing && existing.username) return existing.username;

    let pendingName = '';
    try { pendingName = localStorage.getItem('adlens_pending_username') || ''; } catch (e) {}
    const username = pendingName || usernameFromEmail(user.email);

    await sb.from('profiles').upsert({ user_id: user.id, username, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
    try { localStorage.removeItem('adlens_pending_username'); } catch (e) {}
    return username;
  }

  async function init(){
    const { data: sessionData } = await sb.auth.getSession();
    if (!sessionData || !sessionData.session) {
      window.location.href = '/index.html';
      return;
    }

    const user = sessionData.session.user;
    document.getElementById('userEmail').textContent = user.email || '';
    const username = await ensureProfileExists(user);
    document.getElementById('greeting').innerHTML = `Welcome back, <span class="grad">${escapeHtml(username)}</span>`;

    const { data: reportRow, error } = await sb
      .from('user_reports')
      .select('report_data, uploaded_at')
      .eq('user_id', user.id)
      .maybeSingle();

    document.getElementById('loadingStage').style.display = 'none';
    document.getElementById('stage').style.display = 'block';

    if (error) {
      console.error('Failed to load saved report:', error.message);
      renderEmptyState();
      return;
    }

    if (reportRow && reportRow.report_data) {
      renderReportCard(reportRow);
    } else {
      renderEmptyState();
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '/index.html';
  });

  init();
</script>

</body>
</html>
